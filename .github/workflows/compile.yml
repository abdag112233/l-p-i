name: Fast Java Compiler
on: [push]

jobs:
  compile_job:
    runs-on: ubuntu-latest
    # إعطاء صلاحية صريحة للروبوت لقراءة محتوى المستودع وتخطي جدار الحماية
    permissions:
      contents: read
      
    steps:
      # التحديث إلى الإصدار v4 الأكثر استقراراً وأماناً
      - uses: actions/checkout@v4

      - name: Set up Java JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download Paper and TAB Jars
        run: |
          curl -L -o paper.jar https://api.papermc.io/v2/projects/paper/versions/1.20.1/builds/196/downloads/paper-1.20.1-196.jar
          curl -L -o tab.jar https://github.com/NEZNAMY/TAB/releases/download/v4.1.5/TAB.v4.1.5.jar

      - name: Prepare and Compile File
        run: |
          mkdir -p me/mahdi18/pixeladmin/managers
          mkdir -p me/mahdi18/pixeladmin
          mv VanishManager.java me/mahdi18/pixeladmin/managers/VanishManager.java
          echo "package me.mahdi18.pixeladmin; import org.bukkit.plugin.java.JavaPlugin; public class PixelAdmin extends JavaPlugin {}" > me/mahdi18/pixeladmin/PixelAdmin.java
          javac -cp "paper.jar:tab.jar:." me/mahdi18/pixeladmin/managers/VanishManager.java me/mahdi18/pixeladmin/PixelAdmin.java
          cp me/mahdi18/pixeladmin/managers/VanishManager.class ./

      - name: Upload Class File Only
        uses: actions/upload-artifact@v4
        with:
          name: compiled-class-file
          path: VanishManager.class
