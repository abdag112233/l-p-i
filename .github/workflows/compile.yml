name: Fast Java Compiler (Minecraft 1.21.1)
on: [push]

jobs:
  compile_job:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Download Paper 1.21.1 and TAB Jars
        run: |
          # تحميل بيبر 1.21.1 بشكل ديناميكي لضمان أحدث نسخة مستقرة
          LATEST_BUILD=$(curl -s https://api.papermc.io/v2/projects/paper/versions/1.21.1 | jq '.builds[-1]')
          curl -L -o paper.jar "https://api.papermc.io/v2/projects/paper/versions/1.21.1/builds/${LATEST_BUILD}/downloads/paper-1.21.1-${LATEST_BUILD}.jar"
          
          # جلب رابط أحدث نسخة من مكتبة TAB تلقائياً عبر الـ API لمنع الـ 404 تماماً
          TAB_URL=$(curl -s https://api.github.com/repos/NEZNAMY/TAB/releases/latest | jq -r '.assets[] | select(.name | endswith(".jar")) | .browser_download_url' | head -n 1)
          echo "Downloading TAB from: $TAB_URL"
          curl -L -o tab.jar "$TAB_URL"

      - name: Prepare and Compile File
        run: |
          mkdir -p me/mahdi18/pixeladmin/managers
          mkdir -p me/mahdi18/pixeladmin
          mv VanishManager.java me/mahdi18/pixeladmin/managers/VanishManager.java
          echo "package me.mahdi18.pixeladmin; import org.bukkit.plugin.java.JavaPlugin; public class PixelAdmin extends JavaPlugin {}" > me/mahdi18/pixeladmin/PixelAdmin.java
          javac -cp "paper.jar:tab.jar:." me/mahdi18/pixeladmin/managers/VanishManager.java me/mahdi18/pixeladmin/PixelAdmin.java
          cp me/mahdi18/pixeladmin/managers/VanishManager.class ./

      - name: Upload Class File Only
        uses: actions/upload-artifact@v4
        with:
          name: compiled-class-file
          path: VanishManager.class
