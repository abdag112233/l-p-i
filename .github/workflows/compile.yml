name: Fast Java Compiler (Minecraft 1.21.1 - Maven Mode)
on: [push]

jobs:
  compile_job:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Download TAB Jar
        run: |
          TAB_URL=$(curl -s https://api.github.com/repos/NEZNAMY/TAB/releases/latest | jq -r '.assets[] | select(.name | endswith(".jar")) | .browser_download_url' | head -n 1)
          echo "Downloading TAB from: $TAB_URL"
          curl -L -o tab.jar "$TAB_URL"

      - name: Create Maven POM File
        run: |
          cat << 'EOF' > pom.xml
          <project xmlns="http://maven.apache.org/POM/4.0.0" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
            xsi:schemaLocation="http://maven.apache.org/POM/4.0.0 http://maven.apache.org/xsd/maven-4.0.0.xsd">
            <modelVersion>4.0.0</modelVersion>
            <groupId>me.mahdi18</groupId>
            <artifactId>pixeladmin</artifactId>
            <version>1.0</version>
            <properties>
              <maven.compiler.source>21</maven.compiler.source>
              <maven.compiler.target>21</maven.compiler.target>
            </properties>
            <repositories>
              <repository>
                <id>papermc</id>
                <url>https://repo.papermc.io/repository/maven-public/</url>
              </repository>
            </repositories>
            <dependencies>
              <dependency>
                <groupId>io.papermc.paper</groupId>
                <artifactId>paper-api</artifactId>
                <version>1.21.1-R0.1-SNAPSHOT</version>
                <scope>provided</scope>
              </dependency>
              <dependency>
                <groupId>me.neznamy</groupId>
                <artifactId>tab-api</artifactId>
                <version>4.1.5</version>
                <scope>system</scope>
                <systemPath>${project.basedir}/tab.jar</systemPath>
              </dependency>
            </dependencies>
          </project>
          EOF

          # ترتيب المجلدات بالشكل الذي يفهمه نظام مافن لضمان استقرار التحويل
          mkdir -p src/main/java/me/mahdi18/pixeladmin/managers
          mv VanishManager.java src/main/java/me/mahdi18/pixeladmin/managers/VanishManager.java
          echo "package me.mahdi18.pixeladmin; import org.bukkit.plugin.java.JavaPlugin; public class PixelAdmin extends JavaPlugin {}" > src/main/java/me/mahdi18/pixeladmin/PixelAdmin.java

      - name: Compile Code Using Maven
        run: |
          mvn clean compile
          cp target/classes/me/mahdi18/pixeladmin/managers/VanishManager.class ./

      - name: Upload Class File Only
        uses: actions/upload-artifact@v4
        with:
          name: compiled-class-file
          path: VanishManager.class
